name: Deploy Social Feed API

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: deploy-social-feed-api-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Building Docker image..."
          docker build \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

          echo "Pushing commit-tagged image..."
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "Pushing latest image..."
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: AWS_REGION,AWS_ACCOUNT_ID,ECR_REPOSITORY,IMAGE_TAG
          script: |
            set -euo pipefail

            CONTAINER_NAME="social-feed-api"
            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

            echo "Authenticating EC2 with Amazon ECR..."
            aws ecr get-login-password \
              --region "$AWS_REGION" \
              | docker login \
                  --username AWS \
                  --password-stdin "$ECR_REGISTRY"

            echo "Pulling Docker image: $IMAGE_URI"
            docker pull "$IMAGE_URI"

            echo "Stopping the existing container, if present..."
            if docker ps -a --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
              docker stop "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
            fi

            echo "Starting the new container..."
            docker run \
              --detach \
              --name "$CONTAINER_NAME" \
              --publish 80:8000 \
              --restart unless-stopped \
              --env-file /home/ubuntu/social-feed-api/.env \
              "$IMAGE_URI"

            echo "Verifying running image..."
            RUNNING_IMAGE=$(docker inspect "$CONTAINER_NAME" --format '{{.Config.Image}}')
            echo "Expected image: $IMAGE_URI"
            echo "Running image:  $RUNNING_IMAGE"

            if [ "$RUNNING_IMAGE" != "$IMAGE_URI" ]; then
              echo "Deployment failed: running image does not match expected image."
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "Waiting for application health check..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1/health >/dev/null; then
                echo "Application is healthy."
                break
              fi

              if ! docker ps --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
                echo "Deployment failed: container exited during startup."
                docker logs "$CONTAINER_NAME" || true
                exit 1
              fi

              sleep 2
            done

            if ! curl -fsS http://127.0.0.1/health >/dev/null; then
              echo "Deployment failed: /health did not become ready in time."
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            echo "Container is running successfully."
            
            docker ps \
              --filter "name=$CONTAINER_NAME" \
              --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'
            
            echo "Removing unused Docker artifacts..."
            
            docker container prune -f || true
            docker image prune -a -f || true
            docker builder prune -a -f || true
            docker volume prune -f || true
            
            echo "Vacuuming system logs..."
            sudo journalctl --vacuum-time=7d || true
            
            echo "Cleaning apt cache..."
            sudo apt clean || true
            sudo apt autoremove -y || true
            
            echo "Deployment completed successfully."